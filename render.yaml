services:
  - type: web
    name: obl-blog-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: gemini
      - key: IMAGE_PROVIDER
        value: gemini
      - key: FREE_MODE
        value: "True"
      - key: APP_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
